name: "SAST - SonarCloud"

on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@v2 
        with:
          egress-policy: audit

      - uses: actions/checkout@v4 
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        # nosemgrep: generic.secrets.security.detected-sonarqube-docs-api-key.detected-sonarqube-docs-api-key
        uses: SonarSource/sonarqube-scan-action@v8 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=lucazana14
            -Dsonar.projectKey=Lucazana14_CapitalAPI

      - name: Convert SonarCloud issues to SARIF
        if: always()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORG: "LucaZana14"
          SONAR_PROJECT: "LucaZana14_CapitalAPI"
        run: |
          python3 .github/scripts/sonar_to_sarif.py
            
      - name: Carica i risultati su GitHub Security
        uses: github/codeql-action/upload-sarif@v4 
        if: always()
        with:
          sarif_file: sonarcloud.sarif