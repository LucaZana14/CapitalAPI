name: "SAST - SonarCloud"

on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        # nosemgrep: generic.secrets.security.detected-sonarqube-docs-api-key.detected-sonarqube-docs-api-key
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=lucazana14
            -Dsonar.projectKey=LucaZana14_php-goof

      - name: Convert SonarCloud issues to SARIF
        if: always()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          python3 - <<'EOF'
          import json, urllib.request, urllib.parse, os, base64, time, sys

          token   = os.environ["SONAR_TOKEN"]
          org     = "lucazana14"
          project = "LucaZana14_CapitalAPI"
          base    = "https://sonarcloud.io"

          LEVEL = {
              "BLOCKER":  "critical",
              "CRITICAL": "critical",
              "MAJOR":    "high",
              "MINOR":    "medium",
              "INFO":     "note",
          }

          def api_get(path, params=None):
              url = f"{base}{path}"
              if params:
                  url += "?" + urllib.parse.urlencode(params)
              req = urllib.request.Request(url)
              creds = base64.b64encode(f"{token}:".encode()).decode()
              req.add_header("Authorization", f"Basic {creds}")
              with urllib.request.urlopen(req) as r:
                  return json.load(r)

          # 1. Aspetta che l'analisi sia completata (max 5 minuti)
          print("Attendo completamento analisi SonarCloud...")
          for attempt in range(30):
              data = api_get("/api/ce/component", {"component": project})
              tasks = data.get("queue", []) + (
                  [data["current"]] if data.get("current") else []
              )
              in_progress = [t for t in tasks if t.get("status") in ("IN_PROGRESS", "PENDING")]
              if not in_progress:
                  current = data.get("current", {})
                  status  = current.get("status", "UNKNOWN")
                  print(f"Analisi completata con status: {status}")
                  if status == "FAILED":
                      print("ATTENZIONE: l'analisi SonarCloud è fallita.")
                      sys.exit(1)
                  break
              print(f"  Tentativo {attempt+1}/30: analisi ancora in corso, attendo 10s...")
              time.sleep(10)
          else:
              print("Timeout attesa analisi. Procedo comunque.")

          # 2. Recupera le issue
          def fetch_issues():
              issues, page, total = [], 1, None
              while total is None or len(issues) < total:
                  data = api_get("/api/issues/search", {
                      "componentKeys": project,
                      "organization":  org,
                      "ps": 500,
                      "p":  page,
                      "statuses": "OPEN,CONFIRMED,REOPENED",
                  })
                  if total is None:
                      total = data["total"]
                      print(f"Totale issue trovate: {total}")
                  issues.extend(data["issues"])
                  if len(data["issues"]) < 500:
                      break
                  page += 1
              return issues

          issues = fetch_issues()

          # 3. Converti in SARIF
          rules, results = {}, []
          for i in issues:
              rid  = i.get("rule", "unknown")
              msg  = i.get("message", "")
              sev  = i.get("severity", "MAJOR")
              comp = i.get("component", "")
              path = comp.split(":", 2)[-1] if ":" in comp else comp
              line = i.get("line", 1) or 1

              if rid not in rules:
                  rules[rid] = {
                      "id": rid,
                      "shortDescription": {"text": rid},
                      "defaultConfiguration": {"level": LEVEL.get(sev, "warning")},
                  }
              results.append({
                  "ruleId": rid,
                  "message": {"text": msg},
                  "level":   LEVEL.get(sev, "warning"),
                  "locations": [{
                      "physicalLocation": {
                          "artifactLocation": {"uri": path, "uriBaseId": "%SRCROOT%"},
                          "region": {"startLine": line},
                      }
                  }],
              })

          sarif = {
              "version": "2.1.0",
              "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
              "runs": [{
                  "tool": {
                      "driver": {
                          "name": "SonarCloud",
                          "version": "1.0",
                          "informationUri": "https://sonarcloud.io",
                          "rules": list(rules.values()),
                      }
                  },
                  "results": results,
              }],
          }

          with open("sonarcloud.sarif", "w") as f:
              json.dump(sarif, f, indent=2)

          print(f"SARIF generato: {len(results)} risultati, {len(rules)} regole")
          EOF
      - name: Carica i risultati su GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: sonarcloud.sarif