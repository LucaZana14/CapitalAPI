name: "API Design & Security Scan"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  spectral-scan:
    name: "Spectral API Linting"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: finto_user
          POSTGRES_PASSWORD: pwd
          POSTGRES_DB: finto_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Setup dell'ambiente Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 2. Installazione dipendenze per l'estrazione
      - name: Install FastAPI & Dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt
          

      # 3. Estrazione dello schema OpenAPI (Usa il tuo script extract_openapi.py)
      - name: Extract OpenAPI Schema
        env: 
            DATABASE_URL: "postgresql://finto_user:pwd@localhost:5432/finto_db"
        run: python3 extract_openapi.py

      - name: Upload OpenAPI Json come artefatto
        uses: actions/upload-artifact@v4
        with:
            name: openapi-schema-file
            path: openapi.json



      # 4. Installazione dei tool (aggiungiamo spectral-sarif)
      - name: Install Spectral and SARIF Converter
        run: |
          npm init -y
          npm install @stoplight/spectral-cli @stoplight/spectral-owasp-ruleset spectral-sarif

      # 5. Scansione con Spectral (Output in JSON per aggirare il bug)
      - name: Run Spectral Scan
        continue-on-error: true # Fondamentale: non blocca la pipeline se trova vulnerabilità
        run: |
          npx spectral lint openapi.json \
            --ruleset .spectral.yaml \
            --format json \
            --output spectral-results.json

      # 6. Conversione Sicura in SARIF (Il nostro workaround)
      - name: Convert JSON to SARIF
        run: npx spectral-sarif -o spectral-results.sarif spectral-results.json

      # 7. Upload su GitHub Security
      - name: Upload Spectral results to GitHub
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: spectral-results.sarif
          category: spectral-api-linting