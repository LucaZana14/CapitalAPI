name: "API Design & Security Scan"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  spectral-scan:
    name: "Spectral API Linting"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: finto_user
          POSTGRES_PASSWORD: pwd
          POSTGRES_DB: finto_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Setup dell'ambiente Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 2. Installazione dipendenze per l'estrazione
      - name: Install FastAPI & Dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt
          

      # 3. Estrazione dello schema OpenAPI (Usa il tuo script extract_openapi.py)
      - name: Extract OpenAPI Schema
        env: 
            DATABASE_URL: "postgresql://finto_user:pwd@localhost:5432/finto_db"
        run: python3 extract_openapi.py

      - name: Upload OpenAPI Json come artefatto
        uses: actions/upload-artifact@v4
        with:
            name: openapi-schema-file
            path: openapi.json



      # 4. Installazione di Spectral e del formattatore SARIF
      - name: Install Spectral CLI
        run: npm install -g @stoplight/spectral-cli

      - name: Run Spectral Scan
        # Rimuoviamo il doppio flag e usiamo la sintassi corretta
        # Non usare "|| true" per ora, così se c'è un errore di sintassi lo vediamo subito
        run: |
          spectral lint openapi.json \
            --ruleset .spectral.yaml \
            --format sarif \
            --output spectral-results.sarif
            
      # 6. Caricamento dei risultati su GitHub Security
      - name: Upload Spectral results to GitHub
        uses: github/codeql-action/upload-sarif@v4
        if: always() # Questo assicura che il caricamento avvenga anche se ci sono warning/errori
        with:
          sarif_file: spectral-results.sarif
          category: spectral-api-linting